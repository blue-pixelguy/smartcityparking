<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Requests - SmartParking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .requests-container {
            max-width: 1200px;
            margin: 100px auto 2rem;
            padding: 0 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab {
            padding: 1rem 2rem;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 600;
            color: #718096;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover {
            color: #667eea;
        }

        .booking-request {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
            transition: all 0.3s;
        }

        .booking-request:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1.5rem;
        }

        .request-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .request-id {
            color: #718096;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status-pending {
            background: #fef5e7;
            color: #f39c12;
        }

        .status-confirmed {
            background: #d5f4e6;
            color: #27ae60;
        }

        .status-completed {
            background: #e8f4fd;
            color: #3498db;
        }

        .request-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            padding: 1.5rem;
            background: #f7fafc;
            border-radius: 12px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .detail-label {
            color: #718096;
            font-size: 0.9rem;
        }

        .detail-value {
            color: #2d3748;
            font-weight: 600;
        }

        .detail-value i {
            color: #667eea;
            margin-right: 0.5rem;
        }

        .customer-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .customer-info h4 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .customer-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .btn-accept {
            flex: 1;
            padding: 1rem;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-accept:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(72, 187, 120, 0.3);
        }

        .btn-reject {
            flex: 1;
            padding: 1rem;
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-reject:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(245, 101, 101, 0.3);
        }

        .btn-contact {
            flex: 1;
            padding: 1rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-contact:hover {
            background: #5568d3;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #718096;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #cbd5e0;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-parking"></i>
                <span>SmartParking</span>
            </div>
            <div class="nav-menu">
                <a href="/dashboard" class="nav-link">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="/logout" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="requests-container">
        <div class="page-header">
            <h1><i class="fas fa-clipboard-list"></i> Booking Requests</h1>
            <p>Manage bookings for your parking spaces</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('pending')">
                <i class="fas fa-clock"></i> Pending
            </button>
            <button class="tab" onclick="switchTab('confirmed')">
                <i class="fas fa-check-circle"></i> Confirmed
            </button>
            <button class="tab" onclick="switchTab('completed')">
                <i class="fas fa-flag-checkered"></i> Completed
            </button>
            <button class="tab" onclick="switchTab('listings')">
                <i class="fas fa-list-alt"></i> My Listings
            </button>
        </div>

        <!-- Booking Requests List -->
        <div id="requestsList">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <h3>Loading booking requests...</h3>
                <p>Please wait</p>
            </div>
        </div>
    </div>

    <!-- Edit Listing Modal -->
    <div id="editModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:16px; padding:2rem; max-width:550px; width:90%; max-height:90vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <h3 style="font-size:1.3rem; font-weight:700; color:#2d3748;"><i class="fas fa-edit"></i> Edit Listing</h3>
                <button onclick="closeEditModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#718096;">&times;</button>
            </div>
            <form id="editListingForm">
                <input type="hidden" id="editParkingId">
                <div style="margin-bottom:1rem;">
                    <label style="font-weight:600; color:#2d3748; display:block; margin-bottom:0.5rem;">Title</label>
                    <input type="text" id="editTitle" style="width:100%; padding:0.75rem; border:2px solid #e2e8f0; border-radius:8px; font-size:1rem;" required>
                </div>
                <div style="margin-bottom:1rem;">
                    <label style="font-weight:600; color:#2d3748; display:block; margin-bottom:0.5rem;">Address</label>
                    <input type="text" id="editAddress" style="width:100%; padding:0.75rem; border:2px solid #e2e8f0; border-radius:8px; font-size:1rem;" required>
                </div>
                <div style="margin-bottom:1rem;">
                    <label style="font-weight:600; color:#2d3748; display:block; margin-bottom:0.5rem;">Price per Hour (₹)</label>
                    <input type="number" id="editPrice" style="width:100%; padding:0.75rem; border:2px solid #e2e8f0; border-radius:8px; font-size:1rem;" min="1" required>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
                    <div>
                        <label style="font-weight:600; color:#2d3748; display:block; margin-bottom:0.5rem;">Available From</label>
                        <input type="datetime-local" id="editAvailableFrom" style="width:100%; padding:0.75rem; border:2px solid #e2e8f0; border-radius:8px; font-size:0.9rem;" required>
                    </div>
                    <div>
                        <label style="font-weight:600; color:#2d3748; display:block; margin-bottom:0.5rem;">Available To</label>
                        <input type="datetime-local" id="editAvailableTo" style="width:100%; padding:0.75rem; border:2px solid #e2e8f0; border-radius:8px; font-size:0.9rem;" required>
                    </div>
                </div>
                <div style="margin-bottom:1rem;">
                    <label style="font-weight:600; color:#2d3748; display:block; margin-bottom:0.5rem;">Total Spaces</label>
                    <input type="number" id="editSpaces" style="width:100%; padding:0.75rem; border:2px solid #e2e8f0; border-radius:8px; font-size:1rem;" min="1" required>
                </div>
                <div style="margin-bottom:1.5rem;">
                    <label style="font-weight:600; color:#2d3748; display:block; margin-bottom:0.5rem;">Google Maps Link (optional)</label>
                    <input type="url" id="editLocationLink" style="width:100%; padding:0.75rem; border:2px solid #e2e8f0; border-radius:8px; font-size:1rem;" placeholder="https://maps.google.com/...">
                </div>
                <div style="display:flex; gap:1rem;">
                    <button type="button" onclick="closeEditModal()" style="flex:1; padding:1rem; background:#e2e8f0; color:#2d3748; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:1rem;">
                        Cancel
                    </button>
                    <button type="button" onclick="saveEditListing()" style="flex:2; padding:1rem; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:1rem;">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentTab = 'pending';

        window.onload = function() {
            loadBookingRequests('pending');
        };

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'listings') {
                loadMyListings();
            } else {
                loadBookingRequests(tab);
            }
        }

        // ─── MY LISTINGS ───────────────────────────────────────────────
        
        // Helper to render listing cards
        function renderListingCards(listings, isExpired) {
            let html = '';
            listings.forEach(listing => {
                const statusColor = listing.status === 'approved' ? '#27ae60' : listing.status === 'pending' ? '#f39c12' : '#e74c3c';
                
                // Parse dates WITHOUT timezone conversion
                const fromDate = listing.available_from.replace('T', ' ').split('.')[0];
                const toDate = listing.available_to.replace('T', ' ').split('.')[0];
                
                // Calculate duration
                const from = new Date(listing.available_from);
                const to = new Date(listing.available_to);
                const durationDays = Math.ceil((to - from) / (1000 * 60 * 60 * 24));
                
                html += `
                    <div class="booking-request listing-card" data-duration="${durationDays}" ${isExpired ? 'style="opacity:0.7; border:2px solid #e74c3c;"' : ''}>
                        <div class="request-header">
                            <div>
                                <div class="request-title">${listing.title}</div>
                                <div class="request-id"><i class="fas fa-map-marker-alt"></i> ${listing.address}</div>
                            </div>
                            <div style="display:flex; gap:0.5rem; align-items:center;">
                                ${isExpired ? '<span class="status-badge" style="background:#e74c3c22; color:#e74c3c;">EXPIRED</span>' : ''}
                                <span class="status-badge" style="background:${statusColor}22; color:${statusColor};">
                                    ${listing.status ? listing.status.toUpperCase() : 'PENDING'}
                                </span>
                            </div>
                        </div>
                        <div class="request-details">
                            <div class="detail-item">
                                <span class="detail-label">Price</span>
                                <span class="detail-value"><i class="fas fa-rupee-sign"></i> ₹${listing.price_per_hour}/hr</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Vehicle Type</span>
                                <span class="detail-value"><i class="fas fa-car"></i> ${listing.vehicle_type}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Total Spaces</span>
                                <span class="detail-value"><i class="fas fa-layer-group"></i> ${listing.total_spaces || 1}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Duration</span>
                                <span class="detail-value"><i class="fas fa-clock"></i> ${durationDays} day${durationDays !== 1 ? 's' : ''}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Available From</span>
                                <span class="detail-value"><i class="fas fa-calendar-check"></i> ${fromDate}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Available To</span>
                                <span class="detail-value"><i class="fas fa-calendar-times"></i> ${toDate}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-contact" onclick='openEditModalById("${listing.id}")'>
                                <i class="fas fa-edit"></i> Edit Details
                            </button>
                        </div>
                    </div>`;
            });
            return html;
        }

        // Filter listings by duration
        function filterListingsByDuration() {
            const selectedDuration = document.getElementById('durationFilter').value;
            const cards = document.querySelectorAll('.listing-card');
            
            cards.forEach(card => {
                const duration = parseInt(card.getAttribute('data-duration'));
                let show = false;
                
                if (selectedDuration === 'all') {
                    show = true;
                } else if (selectedDuration === '1') {
                    show = duration <= 1;
                } else if (selectedDuration === '2') {
                    show = duration <= 2;
                } else if (selectedDuration === '3') {
                    show = duration <= 3;
                } else if (selectedDuration === '7') {
                    show = duration >= 4 && duration <= 7;
                } else if (selectedDuration === '30') {
                    show = duration >= 8;
                }
                
                card.style.display = show ? 'block' : 'none';
            });
        }
        
        // Store all listings globally for edit modal
        let allListings = [];
        
        async function loadMyListings() {
            const token = localStorage.getItem('token');
            const requestsList = document.getElementById('requestsList');
            requestsList.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><h3>Loading your listings...</h3></div>';

            try {
                console.log('🔍 Fetching my listings...');
                const response = await fetch('/api/parking/my-listings', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                console.log('📡 Response status:', response.status);
                const data = await response.json();
                console.log('📦 Response data:', data);
                
                const listings = data.parking_spaces || [];
                console.log('✅ Got', listings.length, 'listings');
                
                // Store globally for edit modal
                allListings = listings;

                if (listings.length === 0) {
                    console.log('ℹ️ No listings found for this user');
                    console.log('Response contained:', data);
                    requestsList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-parking"></i>
                            <h3>No listings yet</h3>
                            <p>You haven't listed any parking spaces with this account yet.</p>
                            <p style="font-size:0.85rem; color:#666; margin-top:0.5rem;">
                                Tip: Make sure you're logged in with the same account that created the listing.
                            </p>
                            <a href="/list-space" style="display:inline-block; margin-top:1rem; padding:0.75rem 2rem; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border-radius:8px; text-decoration:none; font-weight:600;">
                                <i class="fas fa-plus"></i> Add New Listing
                            </a>
                        </div>`;
                    return;
                }

                // Separate expired and available listings
                const now = new Date();
                const availableListings = [];
                const expiredListings = [];
                
                listings.forEach(listing => {
                    if (new Date(listing.available_to) < now) {
                        expiredListings.push(listing);
                    } else {
                        availableListings.push(listing);
                    }
                });

                // Add sort controls
                let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
                    <h3 style="color:#2d3748;">Your Parking Listings (${listings.length})</h3>
                    <div style="display:flex; gap:1rem; align-items:center;">
                        <select id="durationFilter" onchange="filterListingsByDuration()" style="padding:0.75rem 1rem; border-radius:8px; border:2px solid #e2e8f0; font-weight:600; cursor:pointer;">
                            <option value="all">All Durations</option>
                            <option value="1">1 Day</option>
                            <option value="2">2 Days</option>
                            <option value="3">3 Days</option>
                            <option value="7">1 Week</option>
                            <option value="30">1 Month+</option>
                        </select>
                        <a href="/list-space" style="padding:0.75rem 1.5rem; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border-radius:8px; text-decoration:none; font-weight:600;">
                            <i class="fas fa-plus"></i> Add New
                        </a>
                    </div>
                </div>`;

                // Available Listings Section
                if (availableListings.length > 0) {
                    html += `<h4 style="color:#27ae60; margin-bottom:1rem; margin-top:2rem;"><i class="fas fa-check-circle"></i> Available (${availableListings.length})</h4>`;
                    html += renderListingCards(availableListings, false);
                }

                // Expired Listings Section
                if (expiredListings.length > 0) {
                    html += `<h4 style="color:#e74c3c; margin-bottom:1rem; margin-top:2rem;"><i class="fas fa-times-circle"></i> Expired (${expiredListings.length})</h4>`;
                    html += renderListingCards(expiredListings, true);
                }

                requestsList.innerHTML = html;
            } catch (error) {
                console.error('❌ CRITICAL ERROR in loadMyListings:');
                console.error('Error:', error);
                console.error('Error message:', error.message);
                console.error('Stack:', error.stack);
                requestsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error loading listings</h3>
                        <p style="color:#e74c3c; font-weight:600;">${error.message || 'Unknown error'}</p>
                        <button class="btn btn-primary" onclick="loadMyListings()" style="margin-top:1rem;">
                            <i class="fas fa-sync"></i> Try Again
                        </button>
                        <p style="font-size:0.85rem; color:#666; margin-top:1rem;">Check browser console (F12) for details</p>
                    </div>`;
            }
        }

        // ─── EDIT MODAL ────────────────────────────────────────────────
        function openEditModalById(listingId) {
            const listing = allListings.find(l => l.id === listingId);
            if (!listing) {
                alert('Error: Listing not found');
                return;
            }
            openEditModal(listing);
        }
        
        function openEditModal(listing) {
            document.getElementById('editParkingId').value = listing.id;
            document.getElementById('editTitle').value = listing.title || '';
            document.getElementById('editAddress').value = listing.address || '';
            document.getElementById('editPrice').value = listing.price_per_hour || '';
            document.getElementById('editSpaces').value = listing.total_spaces || 1;
            document.getElementById('editLocationLink').value = listing.location_link || '';

            // Format datetime WITHOUT timezone conversion
            // Input format: "2026-02-26T13:52:00" or "2026-02-26 13:52:00"
            // Output format: "2026-02-26T13:52" for datetime-local input
            if (listing.available_from) {
                const fromStr = listing.available_from.replace(' ', 'T').substring(0, 16);
                document.getElementById('editAvailableFrom').value = fromStr;
            }
            if (listing.available_to) {
                const toStr = listing.available_to.replace(' ', 'T').substring(0, 16);
                document.getElementById('editAvailableTo').value = toStr;
            }

            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        async function saveEditListing() {
            const token = localStorage.getItem('token');
            const parkingId = document.getElementById('editParkingId').value;

            const availableFrom = document.getElementById('editAvailableFrom').value;
            const availableTo = document.getElementById('editAvailableTo').value;
            
            // Calculate total_hours
            const fromDate = new Date(availableFrom);
            const toDate = new Date(availableTo);
            const totalHours = Math.ceil((toDate - fromDate) / (1000 * 60 * 60));

            const updateData = {
                title:          document.getElementById('editTitle').value.trim(),
                address:        document.getElementById('editAddress').value.trim(),
                price_per_hour: parseFloat(document.getElementById('editPrice').value),
                total_spaces:   parseInt(document.getElementById('editSpaces').value),
                available_from: availableFrom,
                available_to:   availableTo,
                total_hours:    totalHours,  // Add this!
                location_link:  document.getElementById('editLocationLink').value.trim()
            };

            if (!updateData.title || !updateData.address || !updateData.price_per_hour) {
                alert('Please fill in all required fields.');
                return;
            }
            if (toDate <= fromDate) {
                alert('Available To must be after Available From.');
                return;
            }

            const saveBtn = document.querySelector('#editModal button[onclick="saveEditListing()"]');
            const originalText = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            try {
                const response = await fetch(`/api/parking/${parkingId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updateData)
                });

                const data = await response.json();
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;

                if (response.ok) {
                    alert('✅ Listing updated successfully!');
                    closeEditModal();
                    loadMyListings();
                } else {
                    alert('❌ Error: ' + (data.message || data.error || 'Failed to update listing'));
                }
            } catch (error) {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
                alert('❌ Failed to update listing. Please try again.');
                console.error('Update error:', error);
            }
        }

        // Close edit modal on outside click
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });


        async function loadBookingRequests(status) {
            const token = localStorage.getItem('token');
            const requestsList = document.getElementById('requestsList');

            try {
                const statusMap = {
                    'pending': 'pending',
                    'confirmed': 'confirmed',
                    'completed': 'completed'
                };

                const response = await fetch(`/api/booking/received-bookings?status=${statusMap[status]}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (data.bookings && data.bookings.length > 0) {
                    displayBookingRequests(data.bookings, status);
                } else {
                    showEmptyState(status);
                }
            } catch (error) {
                console.error('Error loading bookings:', error);
                requestsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error loading bookings</h3>
                        <p>Please try again later</p>
                    </div>
                `;
            }
        }

        function displayBookingRequests(bookings, status) {
            const requestsList = document.getElementById('requestsList');
            let html = '';

            bookings.forEach(booking => {
                const statusClass = `status-${booking.status}`;
                const startDate = new Date(booking.start_time).toLocaleString();
                const endDate = new Date(booking.end_time).toLocaleString();

                html += `
                    <div class="booking-request">
                        <div class="request-header">
                            <div>
                                <div class="request-title">${booking.parking.title}</div>
                                <div class="request-id">Booking ID: #${booking.id.substring(0, 8)}</div>
                                ${booking.parking.location_link ? `
                                    <div style="margin-top: 0.5rem;">
                                        <a href="${booking.parking.location_link}" target="_blank" style="color: #48bb78; text-decoration: none; font-size: 0.9rem;">
                                            <i class="fas fa-map-marked-alt"></i> View Location on Maps
                                        </a>
                                    </div>
                                ` : ''}
                            </div>
                            <div class="status-badge ${statusClass}">
                                <i class="fas fa-circle"></i> ${booking.status.toUpperCase()}
                            </div>
                        </div>

                        <div class="customer-info">
                            <h4><i class="fas fa-user"></i> Customer Details</h4>
                            <div class="customer-row">
                                <span>Name:</span>
                                <span><strong>${booking.user_name || booking.user.name}</strong></span>
                            </div>
                            <div class="customer-row">
                                <span>Phone:</span>
                                <span><strong>${booking.user_phone || booking.user.phone}</strong></span>
                            </div>
                            <div class="customer-row">
                                <span>Vehicle:</span>
                                <span><strong>${booking.vehicle_type} - ${booking.vehicle_number}</strong></span>
                            </div>
                        </div>

                        <div class="request-details">
                            <div class="detail-item">
                                <span class="detail-label">Start Time</span>
                                <span class="detail-value">
                                    <i class="fas fa-calendar-check"></i>
                                    ${startDate}
                                </span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">End Time</span>
                                <span class="detail-value">
                                    <i class="fas fa-calendar-times"></i>
                                    ${endDate}
                                </span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Duration</span>
                                <span class="detail-value">
                                    <i class="fas fa-clock"></i>
                                    ${booking.duration_hours} hours
                                </span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Total Amount</span>
                                <span class="detail-value">
                                    <i class="fas fa-rupee-sign"></i>
                                    ₹${booking.total_price}
                                </span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Payment Method</span>
                                <span class="detail-value">
                                    <i class="fas fa-wallet"></i>
                                    ${booking.payment_method === 'cash' ? 'Cash (Receive at parking)' : 'UPI'}
                                </span>
                            </div>
                        </div>

                        <div class="action-buttons">
                            ${status === 'pending' ? `
                                <button class="btn-accept" onclick="acceptBooking('${booking.id}')">
                                    <i class="fas fa-check"></i> Accept
                                </button>
                                <button class="btn-reject" onclick="rejectBooking('${booking.id}')">
                                    <i class="fas fa-times"></i> Reject
                                </button>
                            ` : ''}
                            ${status === 'confirmed' ? `
                                <button class="btn-contact" onclick="contactCustomer('${booking.user_phone || booking.user.phone}')">
                                    <i class="fas fa-phone"></i> Contact Customer
                                </button>
                                <button class="btn-accept" onclick="confirmPayment('${booking.id}', '${booking.payment_method}')">
                                    <i class="fas fa-check-circle"></i> ${booking.payment_method === 'cash' ? 'Received Cash' : 'Received UPI Payment'}
                                </button>
                            ` : ''}
                            ${status === 'completed' ? `
                                <button class="btn-contact">
                                    <i class="fas fa-check-double"></i> Completed
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });

            requestsList.innerHTML = html;
        }

        function showEmptyState(status) {
            const requestsList = document.getElementById('requestsList');
            const messages = {
                'pending': { icon: 'inbox', title: 'No pending requests', text: 'New booking requests will appear here' },
                'confirmed': { icon: 'check-circle', title: 'No confirmed bookings', text: 'Accepted bookings will appear here' },
                'completed': { icon: 'flag-checkered', title: 'No completed bookings', text: 'Your booking history will appear here' }
            };

            const msg = messages[status];
            requestsList.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-${msg.icon}"></i>
                    <h3>${msg.title}</h3>
                    <p>${msg.text}</p>
                </div>
            `;
        }

        async function acceptBooking(bookingId) {
            if (!confirm('Accept this booking request?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`/api/booking/${bookingId}/confirm`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    alert('Booking accepted successfully!');
                    loadBookingRequests(currentTab);
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to accept booking');
                }
            } catch (error) {
                console.error('Error accepting booking:', error);
                alert('Failed to accept booking');
            }
        }

        async function rejectBooking(bookingId) {
            if (!confirm('Reject this booking request?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`/api/booking/${bookingId}/cancel`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    alert('Booking rejected');
                    loadBookingRequests(currentTab);
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to reject booking');
                }
            } catch (error) {
                console.error('Error rejecting booking:', error);
                alert('Failed to reject booking');
            }
        }

        function contactCustomer(phone) {
            window.location.href = `tel:${phone}`;
        }

        async function confirmPayment(bookingId, paymentMethod) {
            const methodText = paymentMethod === 'cash' ? 'cash payment' : 'UPI payment';
            if (!confirm(`Confirm you have received ${methodText}?`)) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`/api/booking/${bookingId}/mark-paid`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        payment_reference: `${paymentMethod.toUpperCase()}-${Date.now()}`
                    })
                });

                if (response.ok) {
                    alert(`${methodText.charAt(0).toUpperCase() + methodText.slice(1)} confirmed! Booking is now active.`);
                    loadBookingRequests(currentTab);
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to confirm payment');
                }
            } catch (error) {
                console.error('Error confirming payment:', error);
                alert('Failed to confirm payment');
            }
        }
    </script>
</body>
</html>
